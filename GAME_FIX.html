        button:disabled{

            background: #f59e0b;

            color: #111;

            filter: grayscale(20%);

        .modal {

            display: none;

            position: fixed;

            inset: 0;

            z-index: 999999;

            width: 100%;

            height: 100%;

            background: rgba(0,0,0,0.7);

            justify-content: center;

            align-items: center;

            opacity: 0;

            transition: opacity 0.3s ease;
        }

        .modal.show {
            /* display: block; */
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            z-index: 1000000;
            background: #1f2937;
            margin: 5% auto;
            padding: 20px;
            width: 60%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            width: calc(100% - 20px);
            max-width: 700px;

            margin: 10px;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        <div id="nameModal" class="name-modal">

                <div class="gender-buttons">

                    <button
                        id="btnPria"
                        onclick="selectGender('pria')"
                        type="button"
                    >
                        ♂️ Pria
                    </button>

                    <button
                        id="btnWanita"
                        onclick="selectGender('wanita')"
                        type="button"
                    >
                        ♀️ Wanita
                    </button>

                </div>
                <div class="select-group">

                    <label>🎭 Trait</label>

                    <select
                    id="playerTrait"
                    required
                    onchange="updateTraitDescription()"
                    >
                        

                        <option value="">
                            Pilih Trait
                        </option>

                        <option value="Strategis">
                            🧠 Strategis
                        </option>

                        <option value="Licik">
                            🐍 Licik
                        </option>

                        <option value="Santai">
                            😴 Santai
                        </option>

                        <option value="Emosional">
                            😡 Emosional
                        </option>

                    </select>
                    <div id="traitDescription"

                    margin-top:10px;
                    padding:12px;
                    border-radius:12px;
                    background:#111827;
                    font-size:13px;
                    line-height:1.5;
                    color:#d1d5db;
                    border:1px solid rgba(255,255,255,0.08);
                    ">
                        Pilih trait untuk melihat detail kemampuan.
                    </div>

                </div>
                <div class="select-group">

                    <label>📍 Asal Kota</label>

                    <select id="playerCity" required>

                        <option value="">

                        </option>

                        <option value="Jakarta">Jakarta</option>
                        <option value="Bandung">Bandung</option>

                    </select>

                </div>
                <br>

                <button onclick="savePlayerName()">

            function processRevengeSystem(){

                let alive = getAlive();

                alive.forEach(p=>{

                    if(!revengeTarget[p]) return;

                    Object.keys(revengeTarget[p]).forEach(enemy=>{

                        let revenge =
                        revengeTarget[p][enemy];

                        if(!revenge) return;

                        // target sudah keluar
                        if(status[enemy] === "KELUAR"){

                            delete revengeTarget[p][enemy];
                            return;
                        }

                        // dendam perlahan reda
                        revenge.anger -= 1;

                        // masih dendam
                        if(revenge.anger > 0){

                            relation[p][enemy] -= 2;

                            // 😡 emosional lebih brutal
                            if(
                                traitsMap[p] === "Emosional"

                                relation[p][enemy] -= 2;
                            }

                            // 😴 santai lebih cepat move on
                            if(
                                traitsMap[p] === "Santai"

                                revenge.anger -= 1;
                            }

                            // log random
                            if(Math.random() < 0.25){

                                log(
                                `🔥 ${p} masih menyimpan dendam kepada ${enemy}`
                                );
                            }
                        }

                        // dendam habis
                        else{

                            delete revengeTarget[p][enemy];
                        }
                    });
                });
            }

            async function processAduDomba(provoker,targetA,targetB){
                isDayProcessing = true;
                updatePlayers();

                // validasi
                if(
                    !provoker ||
                    !targetA ||
                    !targetB
                ){
                    return false;
                }

                if(
                    targetA === targetB ||
                    provoker === targetA ||
                    provoker === targetB
                ){
                    return false;
                }

                // cek status keluar
                if(
                    status[provoker] === "KELUAR" ||
                    status[targetA] === "KELUAR" ||
                    status[targetB] === "KELUAR"
                ){
                    return false;
                }

                log(
                `💥 ${provoker} mulai mengadu domba ${targetA} dan ${targetB}`
                );

                await delay(700);

                // =====================
                // CHANCE SYSTEM
                // =====================

                let chance = 45;

                // trait bonus
                switch(traitsMap[provoker]){

                    case "Licik":
                        chance += 20;
                        break;

                    case "Strategis":
                        chance += 10;
                        break;

                    case "Emosional":
                        chance -= 5;
                        break;
                }

                // reputasi pengaruh
                chance += reputation[provoker] * 0.25;

                // target dekat = lebih susah dipecah
                let closeness =
                (
                    relation[targetA][targetB] || 0
                ) +
                (
                    relation[targetB][targetA] || 0
                );

                chance -= closeness * 0.15;

                // limit
                if(chance > 90){
                    chance = 90;
                }

                if(chance < 10){
                    chance = 10;
                }

                let success =
                Math.random() * 100 < chance;

                // =====================
                // SUCCESS
                // =====================

                if(success){

                    log(
                    `🔥 Adu domba berhasil memicu konflik antara ${targetA} dan ${targetB}`
                    );

                    await delay(700);

                    let damage =
                    Math.floor(Math.random()*5)+3;

                    relation[targetA][targetB] -= damage;

                    relation[targetB][targetA] -= damage;

                    addReputation(targetA, -2);

                    addReputation(targetB, -2);

                    addReputation(provoker, 2);

                    log(
                    `💔 Hubungan ${targetA} dan ${targetB} memburuk (-${damage})`
                    );

                    log(
                    `📉 Reputasi ${targetA} dan ${targetB} menurun`
                    );

                    log(
                    `📈 Reputasi ${provoker} meningkat karena berhasil mempengaruhi rumah`
                    );

                    
                    updateSpecialRelations();

                    updateGangs();

                    isDayProcessing = false;

                    updatePlayers();

                    // saveGame();
                    return true;
                }

                // =====================
                // FAIL
                // =====================

                else{

                    log(
                    `😐 Adu domba ${provoker} gagal`
                    );

                    await delay(700);

                    addReputation(provoker, -4);

                    addReputation(targetA, 1);

                    addReputation(targetB, 1);

                    relation[targetA][provoker] -= 2;

                    relation[targetB][provoker] -= 2;

                    log(
                    `📉 Reputasi ${provoker} menurun karena aksinya mulai disadari`
                    );

                    log(
                    `📈 Reputasi ${targetA} dan ${targetB} justru membaik karena simpati pemirsa kepada mereka`
                    );

                    
                    updateSpecialRelations();

                    updateGangs();

                    isDayProcessing = false;

                    updatePlayers();

                    // saveGame();
                    return false;
                }
                
            }


            async function processAutoGossip(){

                if(Math.random() > 0.45){
                    return;
                }

                // pilih provoker
                let provoker =
                alive[
                    Math.floor(Math.random() * alive.length)
                ];

                // trait santai jarang gossip
                if(
                    traitsMap[provoker] === "Santai" &&
                    Math.random() < 0.6
                ){
                    return;

                // cari target paling dibenci
                let candidates =
                alive.filter(p => p !== provoker);

                if(candidates.length === 0){

                candidates.sort((a,b)=>
                    relation[provoker][a] -

                // kalau relation belum negatif
                // jangan gossip
                if(
                    relation[provoker][target] > -5
                ){
                    return;
                }

                await processGossip(provoker, target);
            }

            function pickWeighted(arr){

                let total = 0;

                arr.forEach(x=>{
                    total += x.score;
                });

                let rand = Math.random() * total;

                let current = 0;

                for(let i=0; i<arr.length; i++){

                    current += arr[i].score;

                    if(rand <= current){

                        return arr[i].name;
                    }
                }

                return arr[0].name;
            }

            async function npcRelationshipAI(){

                let alive = getAlive();
                // ⚠️ masih ada popup request
                if(npcRequest){
                    return;
                }

                // =====================
                // NPC PACARAN
                // =====================

                for(let a of alive){

                    for(let b of alive){

                        if(a === b) continue;

                        // jangan ganggu player
                        if(a === playerName) continue;
                        if(b === playerName) continue;

                        // beda gender
                        if(genderMap[a] === genderMap[b]){
                            continue;
                        }

                        let relAB =
                        relation[a][b] || 0;

                        let relBA =
                        relation[b][a] || 0;
                        // =====================
                        // NPC INVITE PLAYER GANG
                        // =====================

                        if(
                            b === playerName &&
                            !gangs.find(g=>g.members.includes(playerName))
                        ){

                            let gangA =
                            gangs.find(g=>g.members.includes(a));

                            if(
                                gangA &&
                                relAB >= 75 &&
                                Math.random() < 0.05
                            ){

                                // openNpcRequest({

                                //     type:"gang",

                                //     from:a,

                                //     gang:gangA.name
                                // });
                                log(
                                `👥 ${a} ingin mengajakmu masuk ${gangA.name}`
                                );

                                setTimeout(()=>{

                                    openNpcRequest({

                                        type:"gang",

                                        from:a,

                                        gang:gangA.name
                                    });

                                },1200);

                                return;
                            }
                        }
                        // =====================
                        // NPC CONFESS
                        // =====================

                        let oppositeGender =
                        genderMap[a] !== genderMap[b];

                        if(
                            b === playerName &&
                            oppositeGender &&
                            !dating[playerName] &&
                            relAB >= 85 &&
                            Math.random() < 0.03
                        ){

                            // openNpcRequest({

                            //     type:"dating",

                            //     from:a
                            // });
                            log(
                            `💘 ${a} terlihat ingin menyatakan sesuatu padamu`
                            );

                            setTimeout(()=>{

                                openNpcRequest({

                                    type:"dating",

                                    from:a
                                });

                            },1200);

                            return;
                        }
                        // ======================
                        // NPC PACARAN
                        // ======================

                        // let oppositeGender =
                        // genderMap[a] !== genderMap[b];

                        let alreadyDating =
                        dating[a] || dating[b];

                        if(
                            oppositeGender &&
                            !alreadyDating &&
                            relAB >= 80 &&
                            relBA >= 80 &&
                            Math.random() < 0.08
                        ){

                            dating[a] = b;
                            dating[b] = a;

                            relation[a][b] += 10;
                            relation[b][a] += 10;

                            log(
                                `💘 ${a} dan ${b} resmi pacaran`
                            );
                        }

                        // syarat jadian
                        if(
                            relAB >= 58 &&
                            relBA >= 58
                        ){

                            // random biar gak instant
                            if(Math.random() > 0.08){
                                continue;
                            }

                            // putusin pasangan lama
                            // removeDating(a);
                            // removeDating(b);
                            if(dating[a]){
                                removeDating(a);
                            }

                            if(dating[b]){
                                removeDating(b);
                            }

                            dating[a] = b;
                            dating[b] = a;

                            log(
                            `❤️ ${a} dan ${b} mulai resmi pacaran`
                            );
                            return;

                            let buff =
                            Math.floor(Math.random()*5)+4;

                            relation[a][b] += buff;
                            relation[b][a] += buff;
                        }
                    }
                }

                // =====================
                // NPC PUTUS
                // =====================

                alive.forEach(a=>{

                    let partner =
                    dating[a];

                    if(!partner) return;

                    // hanya proses 1x
                    if(a > partner) return;

                    let rel =
                    relation[a][partner];

                    // hubungan toxic
                    if(rel <= 10){

                        if(Math.random() < 0.25){

                            delete dating[a];
                            delete dating[partner];

                            log(
                            `💔 ${a} dan ${partner} resmi putus`
                            );

                            relation[a][partner] -= 8;
                            relation[partner][a] -= 8;
                        }
                    }
                });

                updatePlayers();
            }

            function acceptNpcRequest(){

                if(!npcRequest) return;

                // =====================
                // GENG
                // =====================

                if(npcRequest.type === "gang"){

                    let gang =
                    gangs.find(g=>g.name === npcRequest.gang);

                    if(gang){

                        gang.members.push(playerName);

                        relation[playerName][npcRequest.from] += 10;
                        relation[npcRequest.from][playerName] += 10;

                        log(
                        `👥 Kamu resmi bergabung dengan ${gang.name}`
                        );
                    }
                }

                // =====================
                // PACARAN
                // =====================

                else if(npcRequest.type === "dating"){

                    dating[playerName] =
                    npcRequest.from;

                    dating[npcRequest.from] =
                    playerName;

                    relation[playerName][npcRequest.from] += 12;
                    relation[npcRequest.from][playerName] += 12;

                    log(
                    `❤️ Kamu resmi pacaran dengan ${npcRequest.from}`
                    );
                }

                closeNpcRequest();

                updatePlayers();

                saveGame();
            }

            function rejectNpcRequest(){

                if(!npcRequest) return;

                relation[npcRequest.from][playerName] -= 12;

                log(
                `💔 Kamu menolak permintaan ${npcRequest.from}`
                );

                closeNpcRequest();

                updatePlayers();

                saveGame();
            }

            async function socializeWithTarget(target){

                // closeSocialModal();
                closeAllSocialUI();

                if(dailySocialCount >= 10){

                    log("❌ Kamu sudah terlalu banyak bersosialisasi hari ini, silahkan bersosialisasi besok.");

                    return;
                }

                // dailySocialCount++;

                let change =
                Math.floor(Math.random()*9)-4;

                // bonus chemistry
                if(
                    traitsMap[playerName] === traitsMap[target]
                ){
                    change += 2;
                }

                // 👥 bonus sesama geng
                let sameGang =
                gangs.some(g =>
                    g.members.includes(playerName)
                    &&
                    g.members.includes(target)
                );
                // ❤️ bonus pacaran
                let isDating =
                dating[playerName] === target;

                if(isDating && change > 0){

                    change += 6;
                }

                if(sameGang && change > 0){

                    change += 4;
                }

                relation[playerName][target] += change;
                relation[target][playerName] += Math.floor(change/2);

                // =========================
                // RESULT
                // =========================

                if(change >= 6){

                    log(
                        `💖 Kamu jadi sangat dekat dengan ${target} (+${change})`
                    );
                }

                else if(change >= 1){

                    log(
                        `🤝 Kamu makin dekat dengan ${target} (+${change})`
                    );
                }

                else if(change <= -6){

                    log(
                        `💥 Kamu bertengkar hebat dengan ${target} (${change})`
                    );
                }

                else{

                    log(
                        `⚡ Kamu bersitegang dengan ${target} (${change})`
                    );
                }

                updateSpecialRelations();
                updatePlayers();
                dailySocialCount++;

                saveGame();
            }

            //update new socialize
            function socialize(){

                let alive = getAlive();

                // =========================
                // PLAYER MASIH HIDUP?
                // =========================

                let playerStillAlive =
                status[playerName] !== "KELUAR";

                // =========================
                // PLAYER SOCIALIZE
                // =========================

                if(playerStillAlive){

                    let npcList =
                    alive.filter(p => p !== playerName);

                    if(npcList.length > 0){

                        let target =
                        npcList[
                            Math.floor(Math.random()*npcList.length)
                        ];

                        // base
                        let change =
                        Math.floor(Math.random()*7) - 3;
                        // let change = Math.floor(Math.random()*11)-5;

                        // trait player
                        change +=
                        getSocialModifier(playerName, change);

                        // trait target
                        change +=
                        getSocialModifier(target, change);

                        // random kecil
                        change +=
                        Math.floor(Math.random()*3) - 1;

                        // limit
                        if(change > 8) change = 8;
                        if(change < -8) change = -8;

                        // update relation
                        relation[playerName][target] += change;
                        relation[target][playerName] += change;
                        updateSpecialRelations();

                        // =========================
                        // LOG PLAYER ONLY
                        // =========================

                        let statusText = "";

                        if(change >= 5){

                            statusText =
                            "jadi sangat dekat ❤️";

                            addReputation(playerName, 2);

                        }else if(change >= 1){

                            statusText =
                            "makin dekat 🤝";

                        }else if(change <= -5){

                            statusText =
                            "bertengkar hebat 💥";

                            addReputation(playerName, -3);

                        }else{

                            statusText =
                            "bersitegang ⚡";
                        }

                        log(
                            `💬 Kamu ${statusText} dengan ${target} (${change})`
                        );
                    }
                }

                // =========================
                // BACKGROUND NPC SOCIAL
                // =========================

                let npcOnly =
                alive.filter(p => p !== playerName);

                let backgroundLoop =
                Math.floor(Math.random()*4) + 2;

                for(let i=0; i<backgroundLoop; i++){

                    let p1 =
                    npcOnly[
                        Math.floor(Math.random()*npcOnly.length)
                    ];

                    let p2 =
                    npcOnly[
                        Math.floor(Math.random()*npcOnly.length)
                    ];

                    if(!p1 || !p2) continue;

                    if(p1 === p2) continue;

                    let npcChange =
                    Math.floor(Math.random()*7) - 3;
                    // let npcChange =
                    // Math.floor(Math.random()*9)-4;

                    npcChange +=
                    getSocialModifier(p1, npcChange);

                    npcChange +=
                    getSocialModifier(p2, npcChange);

                    npcChange +=
                    Math.floor(Math.random()*3) - 1;

                    if(npcChange > 8) npcChange = 8;
                    if(npcChange < -8) npcChange = -8;

                    relation[p1][p2] += npcChange;
                    relation[p2][p1] += npcChange;

                    // reputasi npc
                    if(npcChange >= 5){

                        addReputation(p1, 1);
                        addReputation(p2, 1);

                    }else if(npcChange <= -5){

                        addReputation(p1, -1);
                        addReputation(p2, -1);
                    }
                }

                updateSpecialRelations();

                updateGangs();

                updatePlayers();

                saveGame();
            }

            function runNpcSocials(){

                let alive = getAlive();

                // jumlah interaksi otomatis
                let interactionCount =
                Math.max(3, Math.floor(alive.length / 2));

                for(let i=0; i<interactionCount; i++){

                    let p1 =
                    alive[Math.floor(Math.random()*alive.length)];

                    let p2 =
                    alive[Math.floor(Math.random()*alive.length)];

                    if(p1 === p2) continue;

                    // let change =
                    // Math.floor(Math.random()*11) - 5;
                    let change = Math.floor(Math.random()*17) - 8;

                    // trait modifier
                    change += getSocialModifier(p1, change);

                    relation[p1][p2] += change;
                    relation[p2][p1] += change;

                    // BATAS
                    relation[p1][p2] =
                    Math.max(-100,
                    Math.min(100, relation[p1][p2]));

                    relation[p2][p1] =
                    Math.max(-100,
                    Math.min(100, relation[p2][p1]));

                    // reputasi sosial
                    if(change > 0){

                        addReputation(p1, 0.4);
                        addReputation(p2, 0.4);

                    }else{

                        addReputation(p1, -0.2);
                        addReputation(p2, -0.2);
                    }
                }
            }

            async function playEndgameStage(stageName){

                let alive = getAlive();

                log("🎮 " + alive.length + " besar bermain di " + stageName + "...");
                await delay(DEBUG_DELAY);

                // =========================
                // BABAK 1
                // =========================

                log("🔥 Babak 1 dimulai...");
                await delay(700);

                let shuffled =
                [...alive].sort(()=>0.5-Math.random());

                let winner1 = shuffled[0];

                log(
                    "🏆 Pemenang babak 1 " +
                    stageName +
                    " = " +
                    winner1
                );

                await delay(700);

                // =========================
                // BABAK TERAKHIR
                // =========================

                log("⚔️ Babak terakhir dimulai...");
                await delay(700);

                let remaining =
                alive.filter(p=>p!==winner1);

                remaining =
                remaining.sort(()=>0.5-Math.random());

                let finalistsNeeded =
                alive.length === 4 ? 2 : 1;

                let winnersFinal =
                remaining.slice(0, finalistsNeeded);

                log(
                    "🎯 Babak ini dimenangkan oleh: " +
                    winnersFinal.join(", ")
                );

                await delay(700);

                let safePlayers =
                [winner1, ...winnersFinal];

                let eliminated =
                alive.filter(p=>!safePlayers.includes(p))[0];
                eliminatedMeta[eliminated] = {

                    dating: dating[eliminated] || null,

                    gang:
                    gangs.find(g=>g.members.includes(eliminated))
                    ?.name || null
                };
                removeDating(eliminated);
                let targetGangName =
                gangs.find(g =>
                    g.members.includes(eliminated)
                )?.name || null;

                // await applyRoleConsequences(
                //     roles.kunci,
                //     eliminated,
                //     "eliminate",
                //     targetGangName
                // );
                removePlayerFromGang(eliminated);


                status[eliminated] = "KELUAR";
                npcDailyBonding();
                
                eliminatedOrder.unshift(eliminated);

                log("❌ Yang tereliminasi = " + eliminated);

                updatePlayers();
            }

            function toggleImunChoice(name){

                // pastikan array selalu ada
                if(!extraditionState.imunChoices){
                    extraditionState.imunChoices = [];
                }

                let btn =
                document.getElementById("imunBtn-"+name);

                // SUDAH DIPILIH
                if(extraditionState.imunChoices.includes(name)){

                    extraditionState.imunChoices =
                    extraditionState.imunChoices
                    .filter(x=>x!==name);

                    btn.innerHTML = btn.dataset.label;

                    btn.style.background = "#f59e0b";
                    saveGame();

                    return;
                }

                // MAX 3
                if(extraditionState.imunChoices.length >= 3){

                    alert(
                    "❌ Gaboleh ceklis imun lebih dari 3.\n\nPilih yang menurutmu layak untuk ditukarkan posisinya 😈"
                    );

                    return;
                }

                // TAMBAH PILIHAN
                extraditionState.imunChoices.push(name);
                saveGame();

                //btn.innerHTML = "✅ " + name;
                btn.innerHTML ="✅ " + btn.dataset.label;
                //btn.innerHTML = btn.dataset.label;
                

                btn.style.background = "#10b981";
            }
