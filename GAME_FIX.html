            function randomScore(p){
            //     let base = Math.random()*50;

            //     if(traitsMap[p]==="Strategis") base += 30;
            //     if(traitsMap[p]==="Licik") base += 20;

            //     return Math.floor(base);
                let base = Math.random()*50;

                switch(traitsMap[p]){

                    case "Strategis":
                        base += 12;
                        break;

                    case "Licik":
                        base += 8;
                        break;

                    case "Santai":
                        base += 5;
                        break;

                    case "Emosional":
                        base += 3;
                        break;
                }

                return Math.floor(base);
            }

            function rankCandidates(list, lowest=false){

                let arr = list.map(p => ({
                    name: p,
                    score: randomScore(p)
                }));

                arr.sort((a,b)=>
                    lowest
                    ? a.score - b.score
                    : b.score - a.score
                );

                return arr;
            }

            function pickWeighted(top3){

                if(top3.length === 1){
                    return top3[0].name;
                }

                if(top3.length === 2){

                    return Math.random() < 0.6
                    ? top3[0].name
                    : top3[1].name;
                }

                let rand = Math.random();

                if(rand < 0.45){
                    return top3[0].name;
                }

                if(rand < 0.80){
                    return top3[1].name;
                }

                return top3[2].name;
            }

            async function playEndgameStage(stageName){

                let alive = getAlive();

                log("🎮 " + alive.length + " besar bermain di " + stageName + "...");
                await delay(DEBUG_DELAY);

                // =========================
                // BABAK 1
                // =========================

                log("🔥 Babak 1 dimulai...");
                await delay(DEBUG_DELAY);

                let shuffled =
                [...alive].sort(()=>0.5-Math.random());

                let winner1 = shuffled[0];

                log(
                    "🏆 Pemenang babak 1 " +
                    stageName +
                    " = " +
                    winner1
                );

                await delay(DEBUG_DELAY);

                // =========================
                // BABAK TERAKHIR
                // =========================

                log("⚔️ Babak terakhir dimulai...");
                await delay(DEBUG_DELAY);

                let remaining =
                alive.filter(p=>p!==winner1);

                remaining =
                remaining.sort(()=>0.5-Math.random());

                let finalistsNeeded =
                alive.length === 4 ? 2 : 1;

                let winnersFinal =
                remaining.slice(0, finalistsNeeded);

                log(
                    "🎯 Babak ini dimenangkan oleh: " +
                    winnersFinal.join(", ")
                );

                await delay(DEBUG_DELAY);

                let safePlayers =
                [winner1, ...winnersFinal];

                let eliminated =
                alive.filter(p=>!safePlayers.includes(p))[0];

                status[eliminated] = "KELUAR";

                eliminatedOrder.unshift(eliminated);

                log("❌ Yang tereliminasi = " + eliminated);

                updatePlayers();
            }

            function toggleImunChoice(name){

                // pastikan array selalu ada
                if(!extraditionState.imunChoices){
                    extraditionState.imunChoices = [];
                }

                let btn =
                document.getElementById("imunBtn-"+name);

                // SUDAH DIPILIH
                if(extraditionState.imunChoices.includes(name)){

                    extraditionState.imunChoices =
                    extraditionState.imunChoices
                    .filter(x=>x!==name);

                    btn.innerHTML = btn.dataset.label;

                    btn.style.background = "#f59e0b";
                    saveGame();

                    return;
                }

                // MAX 3
                if(extraditionState.imunChoices.length >= 3){

                    alert(
                    "❌ Gaboleh ceklis imun lebih dari 3.\n\nPilih yang menurutmu layak untuk ditukarkan posisinya 😈"
                    );

                    return;
                }

                // TAMBAH PILIHAN
                extraditionState.imunChoices.push(name);
                saveGame();

                //btn.innerHTML = "✅ " + name;
                btn.innerHTML ="✅ " + btn.dataset.label;
                //btn.innerHTML = btn.dataset.label;
                

                btn.style.background = "#10b981";

                                ❤️ ${getRelationSafe(playerName,p)}

                            </button><br>
                            `;
                        });

                        openDecisionModal(
                            "👑 Kamu adalah BOS",
                            html
                        );
                    }

                    else if(pendingDecision.type === "imun"){

                        reopenImunPopup();
                    }

                    else if(pendingDecision.type === "pk"){

                        reopenPKPopup();
                    }
                    else if(pendingDecision.type === "amnesty"){

                        let html = "";

                        amnestyState.final2.forEach(p=>{

                            html += `
                            <button onclick="voteAmnesty('${p}')">

                                Pilih ${p}

                                ❤️ ${getRelationSafe(playerName,p)}

                            </button><br>
                            `;
                        });

                        openDecisionModal(
                            "🔥 Voting Amnesti",
                            html
                        );
                    }

                },300);

            }else{

                document.getElementById("day").innerText =
                // "Game Belum Dimulai";
                "Perkenalan Rumah Karantina";

            }
        </script>
