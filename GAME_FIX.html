        button:disabled{

            background: #f59e0b;

        .modal {

            display: none;

            position: fixed;

            inset: 0;

            z-index: 999999;

            width: 100%;

            height: 100%;

            background: rgba(0,0,0,0.7);

            justify-content: center;

            align-items: center;

            opacity: 0;

            transition: opacity 0.3s ease;
            pointer-events:auto;

        .modal.show {
            /* display: block; */

            opacity: 1;

        .modal-content {
            position: relative;
            z-index: 1000000;
            background: #1f2937;
            margin: 5% auto;
            padding: 20px;
            width: 60%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            width: calc(100% - 20px);
            max-width: 700px;
            pointer-events:auto;

            margin: 10px;
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        @keyframes fadeOut{
            from{opacity:1;}
            to{opacity:0;}
        }

        @keyframes slideDown{
            from{
                transform:translateY(0);
                opacity:1;
            }

            to{
                transform:translateY(20px);
                opacity:0;
            }
        }
        @keyframes popCorrect{

            0%{
            transform:scale(0.7);
            }

            70%{
            transform:scale(1.15);
            }

            100%{
            transform:scale(1);
            }
        }

        @keyframes shakeWrong{

            0%{
            transform:translateX(0);
            }

            25%{
            transform:translateX(-6px);
            }

            50%{
            transform:translateX(6px);
            }

            75%{
            transform:translateX(-4px);
            }

            100%{
            transform:translateX(0);
            }
        }
        @keyframes freezeBlink{

            0%{
                opacity:1;
            }

            50%{
                opacity:.45;
            }

            100%{

            }
        }
        @keyframes timingPulse{

            line-height:1;

            color:white;

            text-shadow:

                    miniGameConfig[game];

                            break;

                            break;

                        case "kelompok":
                            roleEmoji = "👥";
                            break;

                        case "semifinal":
                            roleEmoji = "🔥";
                            break;

                        case "final":
                            roleEmoji = "🏆";
                            break;

                        case "grandfinal":

                            break;

            function simulateNpcMiniGame(player, type){

                // let score =
                // Math.floor(Math.random()*60);
                let game =
                currentMiniGames[type];

                let config =
                miniGameConfig[game];
                if(!config){

                    console.log(
                        "MINIGAME CONFIG NOT FOUND:",
                        type,
                        game
                    );

                    return Math.floor(Math.random()*50)+20;
                }

                let score =
                Math.floor(
                    Math.random() * config.npcBase
                );

                switch(traitsMap[player]){

                    case "Strategis":

                        if(
                            currentMiniGames[type] === "memory"
                        ){
                            score += 25;
                        }

                        break;

                    case "Licik":

                        if(
                            currentMiniGames[type] === "rolebox"
                        ){
                            score += 25;
                        }

                        break;

                    case "Santai":

                        score += 5;
                        break;

                    case "Emosional":

                        score +=
                        Math.floor(Math.random()*30)-10;
                        break;
                }
                // GAME BONUS

                if(game === "memory"){

                    if(traitsMap[player] === "Strategis"){
                        score += 20;
                    }
                }

                if(game === "reaction"){

                    if(traitsMap[player] === "Emosional"){
                        score += 15;
                    }
                }

                if(game === "rolebox"){

                    if(traitsMap[player] === "Licik"){
                        score += 20;
                    }
                }

                // if(game === "slowtap"){

                //     if(traitsMap[player] === "Santai"){
                //         score += 20;
                //     }
                // }
                if(game === "freeze"){

                    // let taps =
                    // 50 + Math.random()*40;

                    // let mistakes =
                    // Math.random()*4;

                    // return Math.max(
                    //     0,
                    //     taps - mistakes*15
                    // );
                    let taps =
                    40 + Math.floor(Math.random()*40);

                    let mistakes =
                    Math.floor(Math.random()*4);

                    let score =
                    taps - (mistakes*15);

                    return Math.max(0,score);
                }
                if(type === "timing"){

                    let total = 0;

                    for(let round=0; round<5; round++){

                        let roll = Math.random();

                        if(roll < 0.15){

                            total += 100;

                        }else if(roll < 0.40){

                            total += 70;

                        }else if(roll < 0.75){

                            total += 40;

                        }else{

                            total += 10;
                        }
                    }

                    return total;
                }

                score += reputation[player] * 0.3;

                return Math.max(
                    0,
                    Math.floor(score)
                );
            }

                ){

                    let maxScore =
                    Math.max(
                        ...Object.values(scoreMap)
                    );

                    let tied =
                    Object.keys(scoreMap)
                    .filter(

                        p => scoreMap[p] === maxScore
                    );

                    if(tied.length > 1){

                        log(
                        `⚔️ ${tied.join(" & ")} harus tanding ulang MEMORY!`
                        );

                        return await runRoleMiniGame(
                            roleType,
                            tied,
                            lowestWin
                        );
                    }
                }
                console.log("FINAL SCORE MAP", scoreMap);
                console.log("KEYS", Object.keys(scoreMap));

                // ART = LOWEST SCORE WIN
                if(lowestWin){

                    return Object.keys(scoreMap)
                    .reduce((a,b)=>

                        scoreMap[a] < scoreMap[b]
                        ? a
                        : b
                    );
                }

                // NORMAL = HIGHEST SCORE
                // return Object.keys(scoreMap)
                // .reduce((a,b)=>

                //     scoreMap[a] > scoreMap[b]
                //     ? a
                //     : b
                // );
                let keys = Object.keys(scoreMap);

                if(keys.length === 1){

                    return keys[0];
                }

                return keys.reduce((a,b)=>

                    scoreMap[a] > scoreMap[b]
                    ? a
                    : b
                );
            }

            function processRevengeSystem(){

                    if(!revengeTarget[p]) return;

                    Object.keys(revengeTarget[p]).forEach(enemy=>{

                        let revenge =
                        revengeTarget[p][enemy];

                        if(!revenge) return;

                        // target sudah keluar
                        if(status[enemy] === "KELUAR"){

                            delete revengeTarget[p][enemy];
                            return;
                        }

                        // dendam perlahan reda
                        revenge.anger -= 1;

                        // masih dendam
                        if(revenge.anger > 0){

                            relation[p][enemy] -= 2;

                            // 😡 emosional lebih brutal
                            if(

                                );
                            }
                        }

                        // dendam habis
                        else{

                            delete revengeTarget[p][enemy];
                        }
                    });
                });
            }
            async function processGossip(provoker, target){
                isDayProcessing = true;
                updatePlayers();

                // validasi
                if(
                    !provoker ||
                    !target ||
                    provoker === target
                ){
                    return false;
                }

                // target keluar
                if(
                    status[provoker] === "KELUAR" ||
                    status[target] === "KELUAR"
                ){
                    return false;
                }

                log(
                `🐍 ${provoker} mulai membuat gossip tentang ${target}`
                );
                await delay(600)

                // =====================
                // BASE CHANCE
                // =====================

                let chance = 50;
                

                // trait bonus
                switch(traitsMap[provoker]){

                    case "Licik":
                        chance += 15;
                        break;

                    case "Strategis":
                        chance += 8;
                        break;

                    case "Emosional":
                        chance -= 5;
                        break;
                }

                // reputasi pengaruh
                chance += reputation[provoker] * 0.3;
                let alive = getAlive().filter(
                    p => p !== provoker && p !== target
                );
                if(activeRoles.bos === target){

                    chance -= 10;

                    if((stats[target]?.bos || 0) >= 4){

                        chance -= 10;
                    }
                }

                let avgTrust = 0;

                alive.forEach(p=>{

                    avgTrust += trust[p][provoker] || 0;
                });

                // avgTrust /= alive.length;
                if(alive.length > 0){

                    avgTrust /= alive.length;

                }else{

                    avgTrust = 50;
                }
                chance += (avgTrust - 50) * 0.18;
                // target yang percaya provoker
                // lebih gampang termakan gossip
                chance +=
                (trust[target][provoker] - 50) * 0.08;

                chance -= reputation[target] * 0.2;

                // rumah yang dekat dengan target
                // lebih susah percaya gossip
                let closeness = 0;

                alive.forEach(p=>{

                    closeness += relation[p][target] || 0;
                });

                closeness /= alive.length;

                chance -= closeness * 0.08;
                

                // limit
                if(chance > 90){
                    chance = 90;
                }

                if(chance < 10){
                    chance = 10;
                }

                // roll
                let success =
                Math.random() * 100 < chance;

                // =====================
                // SUCCESS
                // =====================

                if(success){

                    log(
                    `🗣️ Gossip tentang ${target} mulai dipercaya penghuni rumah`
                    );
                    await delay(600)

                    // addReputation(provoker, 4);

                    log(
                    `📈 Reputasi ${provoker} meningkat karena dianggap membawa informasi`
                    );

                    log(
                    `📉 Reputasi ${target} mulai menurun akibat gossip rumah`
                    );

                    addReputation(provoker, 3);
                    

                    addReputation(target, -4);

                    // beberapa penghuni mulai curiga
                    let alive =
                    getAlive().filter(
                        p =>
                        p !== provoker &&
                        p !== target
                    );

                    let affected =
                    alive.sort(()=>Math.random()-0.5)
                    .slice(0,3);

                    alive.forEach(p=>{

                        if(p === provoker || p === target) return;

                        trust[p][provoker] += 5;

                        if(trust[p][provoker] > 100){
                            trust[p][provoker] = 100;
                        }
                    });

                    affected.forEach(p=>{

                        relation[p][target] -= 2;

                        log(
                        `😒 ${p} mulai curiga kepada ${target}`
                        );
                    });

                    
                    updateSpecialRelations();

                    updateGangs();

                    isDayProcessing = false;

                    updatePlayers();

                    // saveGame();

                    return true;
                }

                // =====================
                // FAIL

                else{

                    log(
                    `😐 Gossip tentang ${target} ternyata tidak terbukti`
                    );
                    await delay(600)

                    // addReputation(provoker, -5);
                    // log(

                    // );

                    `📉 Reputasi ${provoker} menurun karena dianggap menyebar fitnah`
                    );

                    addReputation(provoker, -5);
                    

                    let alive =
                    getAlive().filter(
                        p =>
                        p !== provoker
                    );

                    let affected =
                    alive.sort(()=>Math.random()-0.5)
                    .slice(0,2);

                        relation[p][provoker] -= 1;

                        trust[p][provoker] -= 12;

                        if(trust[p][provoker] < 0){

                        }

                    updateSpecialRelations();

                    isDayProcessing = false;

                    !targetB
                ){
                    return false;
                }

                if(
                    targetA === targetB ||
                    provoker === targetA ||
                    provoker === targetB
                ){
                    return false;
                }

                // cek status keluar
                if(
                    status[provoker] === "KELUAR" ||
                    status[targetA] === "KELUAR" ||
                    status[targetB] === "KELUAR"
                ){
                    return false;
                }

                log(
                `💥 ${provoker} mulai mengadu domba ${targetA} dan ${targetB}`
                );

                await delay(700);

                // =====================
                // CHANCE SYSTEM
                // =====================

                let chance = 45;
                let alive =
                getAlive().filter(
                    p =>
                    p !== provoker &&
                    p !== targetA &&
                    p !== targetB
                );

                let avgTrust = 0;

                alive.forEach(p=>{

                    avgTrust += trust[p][provoker] || 0;
                });

                if(alive.length > 0){

                    avgTrust /= alive.length;

                }else{

                    avgTrust = 50;
                }

                // trust mempengaruhi keberhasilan adu domba
                // chance  += (avgTrust - 50) * 0.5;
                

                // trait bonus
                switch(traitsMap[provoker]){

                    case "Licik":
                        chance += 20;
                        break;

                    case "Strategis":
                        chance += 10;
                        break;

                    case "Emosional":
                        chance -= 5;
                        break;
                }

                // reputasi pengaruh
                chance += reputation[provoker] * 0.25;
                // =========================
                // TRUST EFFECT
                // =========================
                if(activeRoles.bos === targetA){

                    chance -= 10;

                    if((stats[targetA]?.bos || 0) >= 4){

                        chance -= 10;
                    }
                }

                if(activeRoles.bos === targetB){

                    chance -= 10;

                    if((stats[targetB]?.bos || 0) >= 4){

                        chance -= 10;
                    }
                }

                // trust rumah ke provoker
                chance += (avgTrust - 50) * 0.25;

                // target lebih gampang percaya
                chance +=
                (trust[targetA][provoker] - 50) * 0.12;

                chance +=
                (trust[targetB][provoker] - 50) * 0.12;

                // rumah mulai kebal omongan dia
                if(avgTrust < 25){

                    chance -= 25;
                }

                // target dekat = lebih susah dipecah
                let closeness =
                (
                    relation[targetA][targetB] || 0
                ) +
                (
                    relation[targetB][targetA] || 0
                );

                chance -= closeness * 0.15;

                // limit
                if(chance > 90){
                    chance = 90;
                }

                if(chance < 10){
                    chance = 10;
                }

                let success =
                Math.random() * 100 < chance;

                // =====================
                // SUCCESS
                // =====================

                if(success){

                    log(
                    `🔥 Adu domba berhasil memicu konflik antara ${targetA} dan ${targetB}`
                    );

                    await delay(700);

                    let damage =
                    Math.floor(Math.random()*5)+3;

                    relation[targetA][targetB] -= damage;

                    relation[targetB][targetA] -= damage;

                    addReputation(targetA, -2);

                    addReputation(targetB, -2);

                    addReputation(provoker, 2);
                    alive.forEach(p=>{

                        if(
                            p === provoker ||
                            p === targetA ||
                            p === targetB
                        ) return;

                        trust[p][provoker] += 6;

                        if(trust[p][provoker] > 100){

                            trust[p][provoker] = 100;
                        }
                    });

                    log(
                    `💔 Hubungan ${targetA} dan ${targetB} memburuk (-${damage})`
                    );

                    log(
                    `📉 Reputasi ${targetA} dan ${targetB} menurun`
                    );

                    log(
                    `📈 Reputasi ${provoker} meningkat karena berhasil mempengaruhi rumah`
                    );

                    
                    updateSpecialRelations();

                    updateGangs();

                    isDayProcessing = false;

                    updatePlayers();

                    // saveGame();
                    return true;
                }

                // =====================
                // FAIL
                // =====================

                else{

                    log(
                    `😐 Adu domba ${provoker} gagal`
                    );

                    await delay(700);

                    addReputation(provoker, -4);
                    alive.forEach(p=>{

                        if(p === provoker) return;

                        trust[p][provoker] -= 15;

                        if(trust[p][provoker] < 0){

                            trust[p][provoker] = 0;
                        }
                    });

                    addReputation(targetA, 1);

                    addReputation(targetB, 1);

                    relation[targetA][provoker] -= 2;

                    relation[targetB][provoker] -= 2;

                    log(
                    `📉 Reputasi ${provoker} menurun karena aksinya mulai disadari`
                    );

                    log(
                    `📈 Reputasi ${targetA} dan ${targetB} justru membaik karena simpati pemirsa kepada mereka`
                    );

                    
                    updateSpecialRelations();

                    updateGangs();

                    isDayProcessing = false;

                    updatePlayers();

                    // saveGame();
                    return false;
                }
                
            }


            async function processAutoGossip(){
                // chaosEventToday = true;
                // socialChaosToday = true;
                // writeDump("processAutoGossip");

                let provokerPool =
                getAlive().filter(
                    p => p !== playerName
                );

                let targetPool =
                getAlive();

                // jangan terlalu sering
                if(Math.random() > 0.45){
                    return false;
                }

                // pilih provoker
                let provoker =
                provokerPool[
                    Math.floor(Math.random() * provokerPool.length)
                ];

                // trait santai jarang gossip
                if(
                    traitsMap[provoker] === "Santai" &&
                    Math.random() < 0.6
                ){
                    return;
                }

                // cari target paling dibenci
                let candidates =
                targetPool.filter(p => p !== provoker);

                if(candidates.length === 0){
                    return;
                }

                // sort berdasarkan relation terburuk
                candidates.sort((a,b)=>
                    relation[provoker][a] -
                    relation[provoker][b]
                );

                let target = candidates[0];

                // kalau relation belum negatif
                // jangan gossip
                if(
                    relation[provoker][target] > -5
                ){
                    return;
                }

                await processGossip(provoker, target);
                return true;
            }

            async function applyRoleConsequences(role,target,type,targetGangName = null){

                let alive = getAlive();
                let totalReaction = 0;

                for(let p of alive){

                    if(p === role) continue;
                    if(p === target) continue;

                    let closeness =
                    relation[p][target] || 0;

                    // 👥 cek apakah satu geng
                    // let sameGang =
                    // gangs.some(g =>
                    //     g.members.includes(p) &&
                    //     g.members.includes(target)
                    // );
                    // let sameGang =
                    // targetGangName &&
                    // gangs.some(g =>
                    //     g.name === targetGangName &&
                    //     g.members.includes(p)
                    // );
                    let sameGang =

                    targetGangName &&

                    gangs.find(g=>g.name===targetGangName)
                    ?.members.includes(p);

                    // =====================
                    // SAVE CONSEQUENCE
                    // =====================

                    if(type === "save"){

                        // teman target suka role
                        if(closeness >= 12){

                            let buff =
                            Math.floor(Math.random()*3)+2;

                            relation[p][role] += buff;
                            relation[role][p] += 1;
                            totalReaction++;

                            log(
                                `❤️ ${p} menghargai keputusan ${role}`
                            );

                            // await delay(500);
                        }

                        // musuh target iri
                        else if(closeness <= -12){

                            relation[p][role] -= 2;
                            totalReaction++;

                            log(
                                `😒 ${p} merasa keputusan ${role} tidak adil`
                            );

                            // await delay(500);
                        }
                    }

                    // =====================
                    // EXTRADISI CONSEQUENCE
                    // =====================

                    else if(type === "eliminate"){

                        // teman korban marah dan satu geng akan sangat marah
                        if(closeness >= 12 || sameGang){

                            let debuff =
                            Math.floor(Math.random()*4)+2;

                            // 👥 member geng lebih sakit hati
                            if(sameGang){
                                debuff += 4;
                            }

                            // 👑 Boss ditakuti → penghuni susah membenci
                            // if(
                            //     activeRoles.bos === role &&
                            //     // bossStreak[role] >= 7
                            //     stats[role].bos >= 4
                            // ){
                            //     debuff = Math.floor(debuff * 0.4);
                            // }
                            if(
                                role &&
                                stats[role] &&
                                activeRoles.bos === role &&
                                stats[role].bos >= 4
                            ){
                                debuff = Math.floor(debuff * 0.4);
                            }


                            relation[p][role] -= debuff;
                            // 🔥 simpan dendam ke PK
                            if(!revengeTarget[p]){

                                revengeTarget[p] = {};
                            }

                            revengeTarget[p][role] = {

                                target: role,

                                reason: target,

                                anger: debuff * 2
                            };
                            totalReaction++;

                            if(sameGang){
                                log(
                                    `👥😡 ${p} marah besar karena member gengnya (${target}) diekstradisi oleh ${role}`
                                );
                            }else{
                                log(
                                    `😡 ${p} kecewa dengan keputusan ${role}`
                                );
                            }

                            // await delay(500);
                        }

                        // musuh korban senang
                        else if(closeness <= -12){

                            relation[p][role] += 2;
                            totalReaction++;

                            log(
                                `😏 ${p} diam-diam senang ${target} keluar`
                            );

                            // await delay(500);
                        }
                    }
                }

                if(totalReaction === 0){

                    log(
                        "😶 Penghuni lain masih memilih diam..."
                    );

                    // await delay(500);
                }
                updateSpecialRelations();
                updateGangs();
                updatePlayers();
            }

            function pickWeighted(arr){

                let total = 0;

                arr.forEach(x=>{
                    total += x.score;
                });

                let rand = Math.random() * total;

                let current = 0;

                for(let i=0; i<arr.length; i++){

                    current += arr[i].score;

                    if(rand <= current){

                        return arr[i].name;
                    }
                }

                return arr[0].name;
            }

            async function npcRelationshipAI(){

                let alive = getAlive();
                // ⚠️ masih ada popup request
                if(npcRequest){
                    return;
                }

                // =====================
                // NPC PACARAN
                // =====================

                for(let a of alive){

                    for(let b of alive){

                        if(a === b) continue;

                        // jangan ganggu player
                        if(a === playerName) continue;
                        if(b === playerName) continue;

                        // beda gender
                        if(genderMap[a] === genderMap[b]){
                            continue;
                        }

                        let relAB =
                        relation[a][b] || 0;

                        let relBA =
                        relation[b][a] || 0;
                        // =====================
                        // NPC INVITE PLAYER GANG
                        // =====================

                        if(
                            b === playerName &&
                            !gangs.find(g=>g.members.includes(playerName))
                        ){

                            let gangA =
                            gangs.find(g=>g.members.includes(a));

                            let gangChance = 0;

                            if(relAB >= 90) gangChance = 0.25;
                            else if(relAB >= 80) gangChance = 0.15;
                            else if(relAB >= 70) gangChance = 0.08;
                            else if(relAB >= 60) gangChance = 0.04;

                            if(
                                gangA &&
                                Math.random() < gangChance
                            ){

                                // openNpcRequest({

                                //     type:"gang",

                                //     from:a,

                                //     gang:gangA.name
                                // });
                                log(
                                `👥 ${a} ingin mengajakmu masuk ${gangA.name}`
                                );

                                // setTimeout(()=>{

                                //     openNpcRequest({

                                //         type:"gang",

                                //         from:a,

                                //         gang:gangA.name
                                //     });

                                // },1200);
                                await delay(1200);

                                await openNpcRequest({

                                    type:"gang",

                                    from:a,

                                    gang:gangA.name
                                });

                                return;
                            }
                        }
                        // =====================
                        // NPC CONFESS
                        // =====================

                        let oppositeGender =
                        genderMap[a] !== genderMap[b];

                        let confessChance = 0;

                        if(relAB >= 90) confessChance = 0.18;
                        else if(relAB >= 80) confessChance = 0.10;
                        else if(relAB >= 70) confessChance = 0.05;

                        if(
                            b === playerName &&
                            oppositeGender &&
                            !dating[playerName] &&
                            Math.random() < confessChance
                        ){

                            // openNpcRequest({

                            //     type:"dating",

                            //     from:a
                            // });
                            log(
                            `💘 ${a} terlihat ingin menyatakan sesuatu padamu`
                            );

                            // setTimeout(()=>{

                            //     openNpcRequest({

                            //         type:"dating",

                            //         from:a
                            //     });

                            // },1200);
                            await delay(1200);

                            await openNpcRequest({

                                type:"dating",

                                from:a
                            });

                            return;
                        }
                        // ======================
                        // NPC PACARAN
                        // ======================

                        // let oppositeGender =
                        // genderMap[a] !== genderMap[b];

                        let alreadyDating =
                        dating[a] || dating[b];

                        if(
                            oppositeGender &&
                            !alreadyDating &&
                            relAB >= 80 &&
                            relBA >= 80 &&
                            Math.random() < 0.08
                        ){

                            dating[a] = b;
                            dating[b] = a;

                            relation[a][b] += 10;
                            relation[b][a] += 10;

                            log(
                                `💘 ${a} dan ${b} resmi pacaran`
                            );
                        }

                        // syarat jadian
                        if(
                            relAB >= 58 &&
                            relBA >= 58
                        ){

                            // random biar gak instant
                            if(Math.random() > 0.08){
                                continue;
                            }

                            // putusin pasangan lama
                            // removeDating(a);
                            // removeDating(b);
                            if(dating[a]){
                                removeDating(a);
                            }

                            if(dating[b]){
                                removeDating(b);
                            }

                            dating[a] = b;
                            dating[b] = a;

                            log(
                            `❤️ ${a} dan ${b} mulai resmi pacaran`
                            );
                            return;

                            let buff =
                            Math.floor(Math.random()*5)+4;

                            relation[a][b] += buff;
                            relation[b][a] += buff;
                        }
                    }
                }

                // =====================
                // NPC PUTUS
                // =====================

                alive.forEach(a=>{

                    let partner =
                    dating[a];

                    if(!partner) return;

                    // hanya proses 1x
                    if(a > partner) return;

                    let rel =
                    relation[a][partner];

                    // hubungan toxic
                    if(rel <= 10){

                        if(Math.random() < 0.25){

                            delete dating[a];
                            delete dating[partner];

                            log(
                            `💔 ${a} dan ${partner} resmi putus`
                            );

                            relation[a][partner] -= 8;
                            relation[partner][a] -= 8;
                        }
                    }
                });

                updatePlayers();
            }

                    let gang =
                    gangs.find(g=>g.name === npcRequest.gang);

                        gang.members.push(playerName);

                        relation[npcRequest.from][playerName] += 10;

                        log(
                        `👥 Kamu resmi bergabung dengan ${gang.name}`
                        );

                        if(npcRequest.resolve){
                            npcRequest.resolve(true);
                        }

                    }
                }

                // =====================
                // PACARAN
                // =====================

                else if(npcRequest.type === "dating"){

                    dating[playerName] =
                    npcRequest.from;

                    dating[npcRequest.from] =

            async function socializeWithTarget(target){

                // closeSocialModal();
                closeAllSocialUI();

                if(dailySocialCount >= 10){

                    log("❌ Kamu sudah terlalu banyak bersosialisasi hari ini, silahkan bersosialisasi besok.");

                    return;
                }

                // dailySocialCount++;

                let change =
                Math.floor(Math.random()*9)-4;

                // bonus chemistry
                if(
                    traitsMap[playerName] === traitsMap[target]
                ){
                    change += 2;
                }

                // 👥 bonus sesama geng
                let sameGang =
                gangs.some(g =>
                    g.members.includes(playerName)
                    &&
                    g.members.includes(target)
                );
                // ❤️ bonus pacaran
                let isDating =
                dating[playerName] === target;

                if(isDating && change > 0){

                    change += 6;
                }

                if(sameGang && change > 0){

                    change += 4;
                }

                relation[playerName][target] += change;
                relation[target][playerName] += Math.floor(change/2);

                // =========================
                // RESULT
                // =========================

                if(change >= 6){

                    log(
                        `💖 Kamu jadi sangat dekat dengan ${target} (+${change})`
                    );
                }

                else if(change >= 1){

                    log(
                        `🤝 Kamu makin dekat dengan ${target} (+${change})`
                    );
                }

                else if(change <= -6){

                    log(
                        `💥 Kamu bertengkar hebat dengan ${target} (${change})`
                    );
                }

                else{

                    log(
                        `⚡ Kamu bersitegang dengan ${target} (${change})`
                    );
                }

                updateSpecialRelations();
                updatePlayers();
                dailySocialCount++;

                saveGame();
            }

            //update new socialize
            function socialize(){

                let alive = getAlive();

                // =========================
                // PLAYER MASIH HIDUP?
                // =========================

                let playerStillAlive =
                status[playerName] !== "KELUAR";

                // =========================
                // PLAYER SOCIALIZE
                // =========================

                if(playerStillAlive){

                    let npcList =
                    alive.filter(p => p !== playerName);

                    if(npcList.length > 0){

                        let target =
                        npcList[
                            Math.floor(Math.random()*npcList.length)
                        ];

                        // base
                        let change =
                        Math.floor(Math.random()*7) - 3;
                        // let change = Math.floor(Math.random()*11)-5;

                        // trait player
                        change +=
                        getSocialModifier(playerName, change);

                        // trait target
                        change +=
                        getSocialModifier(target, change);

                        // random kecil
                        change +=
                        Math.floor(Math.random()*3) - 1;

                        // limit
                        if(change > 8) change = 8;
                        if(change < -8) change = -8;

                        // update relation
                        relation[playerName][target] += change;
                        relation[target][playerName] += change;
                        updateSpecialRelations();

                        // =========================
                        // LOG PLAYER ONLY
                        // =========================

                        let statusText = "";

                        if(change >= 5){

                            statusText =
                            "jadi sangat dekat ❤️";

                            addReputation(playerName, 2);

                        }else if(change >= 1){

                            statusText =
                            "makin dekat 🤝";

                        }else if(change <= -5){

                            statusText =
                            "bertengkar hebat 💥";

                            addReputation(playerName, -3);

                        }else{

                            statusText =
                            "bersitegang ⚡";
                        }

                        log(
                            `💬 Kamu ${statusText} dengan ${target} (${change})`
                        );
                    }
                }

                // =========================
                // BACKGROUND NPC SOCIAL
                // =========================

                let npcOnly =
                alive.filter(p => p !== playerName);

                let backgroundLoop =
                Math.floor(Math.random()*4) + 2;

                for(let i=0; i<backgroundLoop; i++){

                    let p1 =
                    npcOnly[
                        Math.floor(Math.random()*npcOnly.length)
                    ];

                    let p2 =
                    npcOnly[
                        Math.floor(Math.random()*npcOnly.length)
                    ];

                    if(!p1 || !p2) continue;

                    if(p1 === p2) continue;

                    let npcChange =
                    Math.floor(Math.random()*7) - 3;
                    // let npcChange =
                    // Math.floor(Math.random()*9)-4;

                    npcChange +=
                    getSocialModifier(p1, npcChange);

                    npcChange +=
                    getSocialModifier(p2, npcChange);

                    npcChange +=
                    Math.floor(Math.random()*3) - 1;

                    if(npcChange > 8) npcChange = 8;
                    if(npcChange < -8) npcChange = -8;

                    relation[p1][p2] += npcChange;
                    relation[p2][p1] += npcChange;

                    // reputasi npc
                    if(npcChange >= 5){

                        addReputation(p1, 1);
                        addReputation(p2, 1);

                    }else if(npcChange <= -5){

                        addReputation(p1, -1);
                        addReputation(p2, -1);
                    }
                }

                updateSpecialRelations();

                updateGangs();

                updatePlayers();

                saveGame();
            }

            function runNpcSocials(){

                let alive = getAlive();

                // jumlah interaksi otomatis
                let interactionCount =
                Math.max(3, Math.floor(alive.length / 2));

                for(let i=0; i<interactionCount; i++){

                    let p1 =
                    alive[Math.floor(Math.random()*alive.length)];

                    let p2 =
                    alive[Math.floor(Math.random()*alive.length)];

                    if(p1 === p2) continue;

                    // let change =
                    // Math.floor(Math.random()*11) - 5;
                    let change = Math.floor(Math.random()*17) - 8;

                    // trait modifier
                    change += getSocialModifier(p1, change);

                    relation[p1][p2] += change;
                    relation[p2][p1] += change;

                    // BATAS
                    relation[p1][p2] =
                    Math.max(-100,
                    Math.min(100, relation[p1][p2]));

                    relation[p2][p1] =
                    Math.max(-100,
                    Math.min(100, relation[p2][p1]));

                    // reputasi sosial
                    if(change > 0){

                        addReputation(p1, 0.4);
                        addReputation(p2, 0.4);

                    }else{

                        addReputation(p1, -0.2);
                        addReputation(p2, -0.2);
                    }
                }
            }

            async function playEndgameStage(stageName){

                let alive = getAlive();

                // =====================================
                // SEMIFINAL (4 BESAR)
                // =====================================
                if(stageName === "SEMIFINAL"){

                    log("🔥 SEMIFINAL DIMULAI!");
                    await delay(DEBUG_DELAY);

                    let semifinalists = [...alive];

                    // =========================
                    // BABAK 1
                    // =========================

                    log("🎮 Babak 1 Semifinal!");
                    await delay(DEBUG_DELAY);

                    let score1 = {};

                    for(let p of semifinalists){

                        // PLAYER MAIN GAME
                        if(p === playerName  && status[playerName] !== "KELUAR"){

                            score1[p] =
                            await openMiniGame("semifinal");

                        }else{

                            score1[p] =
                            simulateNpcMiniGame(
                                p,
                                "semifinal"
                            );
                        }

                        log(`🎯 ${p}: ${score1[p]} poin`);
                    }

                    // ranking
                    let ranking1 =
                    [...semifinalists]
                    .sort((a,b)=>score1[b]-score1[a]);

                    let autoFinalist = ranking1[0];

                    log(
                        `🏆 ${autoFinalist} otomatis lolos ke babak FINAL!`
                    );

                    await delay(DEBUG_DELAY);

                    // sisa 3 orang
                    let round2Players =
                    semifinalists.filter(
                        p => p !== autoFinalist
                    );

                    // kalau player menang babak 1
                    // dan babak 2 NPC semua
                    let playerWonRound1 =
                    autoFinalist === playerName;

                    // =========================
                    // BABAK 2
                    // =========================

                    log("🎮 Babak 2 Semifinal!");
                    await delay(DEBUG_DELAY);

                    let score2 = {};

                    for(let p of round2Players){

                        if(
                            p === playerName
                            && !playerWonRound1
                            && status[playerName] !== "KELUAR"
                        ){

                            score2[p] =
                            await openMiniGame("semifinal");

                        }else{

                            score2[p] =
                            simulateNpcMiniGame(
                                p,
                                "semifinal"
                            );
                        }

                        log(`🎯 ${p}: ${score2[p]} poin`);
                    }

                    let ranking2 =
                    [...round2Players]
                    .sort((a,b)=>score2[b]-score2[a]);

                    let secondFinalist = ranking2[0];
                    let eliminated = ranking2[2];

                    log(
                        `🏆 ${secondFinalist} lolos ke babak FINAL!`
                    );
                    eliminatedMeta[eliminated] = {

                        dating: dating[eliminated] || null,

                        gang:
                        gangs.find(g=>g.members.includes(eliminated))
                        ?.name || null
                    };
                    removeDating(eliminated);
                    let targetGangName =
                    gangs.find(g =>
                        g.members.includes(eliminated)
                    )?.name || null;

                    await delay(DEBUG_DELAY);

                    log(
                        `❌ ${eliminated} tereliminasi di semifinal!`
                    );

                    status[eliminated] = "KELUAR";

                    // eliminatedOrder.push(eliminated);
                    eliminatedOrder.unshift(eliminated);

                    updatePlayers();

                    saveGame();

                    return;
                }

                // =====================================
                // FINAL (3 BESAR)
                // =====================================
                if(stageName === "FINAL"){

                    log("🏆 FINAL DIMULAI!");
                    await delay(DEBUG_DELAY);

                    let finalists = [...alive];

                    // =========================
                    // BABAK 1
                    // =========================

                    log("🎮 Babak 1 Final!");
                    await delay(DEBUG_DELAY);

                    let score1 = {};

                    for(let p of finalists){

                        if(p === playerName && status[playerName] !== "KELUAR"){

                            score1[p] =
                            await openMiniGame("final");

                        }else{

                            score1[p] =
                            simulateNpcMiniGame(
                                p,
                                "final"
                            );
                        }

                        log(`🎯 ${p}: ${score1[p]} poin`);
                    }

                    let ranking1 =
                    [...finalists]
                    .sort((a,b)=>score1[b]-score1[a]);

                    let grandFinalist = ranking1[0];

                    log(
                        `👑 ${grandFinalist} otomatis lolos GRAND FINAL!`
                    );

                    await delay(DEBUG_DELAY);

                    let round2Players =
                    finalists.filter(
                        p => p !== grandFinalist
                    );

                    let playerWonRound1 =
                    grandFinalist === playerName;

                    // =========================
                    // BABAK 2
                    // =========================

                    log("🎮 Babak 2 Final!");
                    await delay(DEBUG_DELAY);

                    let score2 = {};

                    for(let p of round2Players){

                        if(
                            p === playerName
                            && !playerWonRound1
                            && status[playerName] !== "KELUAR"
                        ){

                            score2[p] =
                            await openMiniGame("final");

                        }else{

                            score2[p] =
                            simulateNpcMiniGame(
                                p,
                                "final"
                            );
                        }

                        log(`🎯 ${p}: ${score2[p]} poin`);
                    }

                    let ranking2 =
                    [...round2Players]
                    .sort((a,b)=>score2[b]-score2[a]);

                    let secondGrandFinalist =
                    ranking2[0];

                    let eliminated =
                    ranking2[1];

                    log(
                        `👑 ${secondGrandFinalist} masuk babak GRAND FINAL!`
                    );
                    eliminatedMeta[eliminated] = {

                        dating: dating[eliminated] || null,

                        gang:
                        gangs.find(g=>g.members.includes(eliminated))
                        ?.name || null
                    };
                    removeDating(eliminated);
                    let targetGangName =
                    gangs.find(g =>
                        g.members.includes(eliminated)

                    await delay(DEBUG_DELAY);

                    log(
                        `❌ ${eliminated} tereliminasi di FINAL!`

                    status[eliminated] = "KELUAR";

                    // eliminatedOrder.push(eliminated);
                    eliminatedOrder.unshift(eliminated);

                    updatePlayers();

                    saveGame();

                    return;
                }

            function toggleImunChoice(name){

                // pastikan array selalu ada
                if(!extraditionState.imunChoices){
                    extraditionState.imunChoices = [];
                }

                let btn =
                document.getElementById("imunBtn-"+name);

                // SUDAH DIPILIH
                if(extraditionState.imunChoices.includes(name)){

                    extraditionState.imunChoices =
                    extraditionState.imunChoices
                    .filter(x=>x!==name);

                    btn.innerHTML = btn.dataset.label;

                    btn.style.background = "#f59e0b";
                    saveGame();

                    return;
                }

                // MAX 3
                if(extraditionState.imunChoices.length >= 3){

                    alert(
                    "❌ Gaboleh ceklis imun lebih dari 3.\n\nPilih yang menurutmu layak untuk ditukarkan posisinya 😈"
                    );

                    return;
                }

                // TAMBAH PILIHAN
                extraditionState.imunChoices.push(name);
                saveGame();

                //btn.innerHTML = "✅ " + name;
                btn.innerHTML ="✅ " + btn.dataset.label;
                //btn.innerHTML = btn.dataset.label;
                

                btn.style.background = "#10b981";
            }

                }

                    belumBottom.map(p=>[p,randomScore(p)]);

                    scores.sort((a,b)=>a[1]-b[1]);

                    pengganti = scores[0][0];

                    log("🎮 3 orang tanding → " +

                bottom3.filter(p=>p!==playerName);
